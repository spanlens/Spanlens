version: 2

# Single root entry covers every workspace package (cli, sdk, server, web)
# because pnpm-lock.yaml lives at the repo root. Per-directory entries were
# tried earlier and they failed: dependabot bumped sub-directory
# package.json files but couldn't update the root pnpm-lock.yaml, so every
# CI run on those PRs died with ERR_PNPM_OUTDATED_LOCKFILE before any
# typecheck or test ever ran. The root entry handles the lockfile correctly.
#
# Notes on the `ignore` rules below — these are workarounds, not preferences.
# Re-evaluate each when the linked compatibility blocker resolves.
#
# - eslint 10: blocked by eslint-plugin-react 7.37 (transitive of
#   eslint-config-next) using the removed context.getFilename() API. Re-enable
#   when eslint-plugin-react ships an ESLint 10-compatible release.
#
# - vitest 4: requires vite ^6 || ^7 || ^8 as peer, but the workspace
#   transitively resolves vite 5 (from other deps). Causes
#   ERR_PACKAGE_PATH_NOT_EXPORTED on 'vite/module-runner' at vitest startup.
#   Re-enable after upgrading vite to >=6 across the workspace.
#
# - globals 17: paired with the vitest 4 bump; safe on its own but Dependabot
#   keeps grouping them. Drop this once vitest 4 is unblocked.
#
# - @types/node 25+: runtime target is Node 22 LTS, so the typings stay on
#   the 22.x line until the runtime moves. The TS 6 + @types/node 25
#   combination already cost a Docker build break (CLAUDE.md gotcha #28);
#   leaving majors un-ignored means dependabot keeps re-issuing the same
#   broken PR every week. Re-enable when the runtime is bumped past 22.

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 1
    labels:
      - dependencies
    ignore:
      - dependency-name: eslint
        update-types: ["version-update:semver-major"]
      - dependency-name: vitest
        update-types: ["version-update:semver-major"]
      - dependency-name: globals
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      # Bundle every safe (minor + patch) bump into a single weekly PR.
      # Majors land as individual PRs so each can be reviewed against
      # its own breaking-change notes — TypeScript 6, zod 4, @types/node 25,
      # @vitest/coverage-v8 4 all want code-level attention.
      all-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 1
    labels:
      - dependencies
    groups:
      all-actions:
        patterns: ["*"]
