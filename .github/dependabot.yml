version: 2

updates:
  # Root workspace (pnpm-lock.yaml)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 1
    labels:
      - dependencies
    groups:
      all-deps:
        patterns: ["*"]

  # Next.js web app
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 1
    labels:
      - dependencies
    groups:
      all-deps:
        patterns: ["*"]

  # Hono server
  - package-ecosystem: npm
    directory: /apps/server
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 1
    labels:
      - dependencies
    groups:
      all-deps:
        patterns: ["*"]

  # JS/TS SDK
  - package-ecosystem: npm
    directory: /packages/sdk
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 1
    labels:
      - dependencies
    groups:
      all-deps:
        patterns: ["*"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 1
    labels:
      - dependencies
    groups:
      all-actions:
        patterns: ["*"]
