name: Cron — server sub-daily

# GitHub Actions cron safety net for Spanlens server endpoints that
# Vercel's scheduled crons keep silently dropping. As of 2026-06-15 the
# production `cron_job_runs` table over 24h shows severe under-firing
# of the */5 schedule (~10/288 runs = 3.5%) and partial drops on
# hourly schedules (self-monitor 2/24, detect-orphan-spans 4/24,
# detect-missing-model-prices 8/24). Project IS on Pro plan (40-cron
# quota) so this is a sync gap, not a quota cap. GH Actions also
# throttles short-cadence cron under load — neither scheduler alone
# is enough at sub-15min cadence, but together they cover most
# windows. For a hard guarantee on critical jobs (replay-fallback,
# self-monitor) set up an external pinger (cron-job.org, Better Stack
# heartbeat, EasyCron) hitting the same /cron/* URLs with the same
# Authorization header.
#
# Endpoints we re-fire from GitHub Actions, ordered by what breaks if
# they stay silent:
#
#   /cron/replay-fallback           every 5 min
#     ClickHouse outage fallback. Failed log inserts queue to Supabase
#     `requests_fallback`; this job drains the queue back to CH. Silent
#     = next CH outage's logs sit in the queue past their 7-day TTL =
#     permanent data loss. Highest-leverage of the lot.
#
#   /cron/execute-pending-deletions every 6h
#     Processes GDPR "right to be forgotten" requests sitting in
#     `pending_deletions`. Silent = compliance violation. Legal /
#     reputational risk.
#
#   /cron/self-monitor              hourly at :31
#     Cron-failure watchdog. Scans `cron_job_runs` for failure rows
#     and creates an internal_alert. Silent = the same class of bug
#     that hit us (Vercel scheduler stops firing X) takes longer to
#     notice next time. Meta-monitoring.
#
#   /cron/run-background-migrations every 5 min  (shipped earlier)
#     Background migration queue runner. Silent = ops cannot kick off
#     a new background migration without manually marking rows.
#
#   /cron/keep-warm                 every 5 min  (shipped earlier)
#     Warms Lambda + Supabase + ClickHouse pools. Silent = first
#     request after idle eats a cold start (~1s tax). Low priority.
#
# Vercel scheduler stays configured in vercel.json so it still fires
# whichever endpoints it decides to honour. Both schedulers calling
# the same endpoint is fine — every handler holds an advisory lock or
# is naturally idempotent.
#
# Required secret: CRON_SECRET in Settings → Secrets, matching the
# Vercel env var of the same name (the handler compares against it).
#
# Each scheduled trigger fires only the job whose `if:` matches the
# triggering schedule, so cadences stay correct. workflow_dispatch
# fires all jobs at once for ad-hoc operator testing.

on:
  schedule:
    # Cadence has to match what the handler expects. Listed here in the
    # same order as the `if:` checks below for grepability. Each entry
    # fires only the matching job (the `if:` predicates downstream
    # compare github.event.schedule to the cron string).
    - cron: '*/5 * * * *'      # every 5 min — replay-fallback, run-background-migrations, keep-warm
    - cron: '0 */6 * * *'      # every 6h on the hour — execute-pending-deletions
    - cron: '31 * * * *'       # hourly :31 — self-monitor
    - cron: '17 * * * *'       # hourly :17 — detect-orphan-spans
    - cron: '0 * * * *'        # hourly :00 — detect-missing-model-prices
    - cron: '0 2 * * *'        # daily 02:00 — events-reconciliation
    - cron: '0 9 * * *'        # daily 09:00 — recommend-savings-alerts
    - cron: '0 10 * * *'       # daily 10:00 — check-past-due-downgrades
    - cron: '0 3 * * *'        # daily 03:00 — prune-judge-cache
    - cron: '0 9 * * 1'        # weekly Monday 09:00 — stale-key-reminders + weekly-digest
    - cron: '30 */6 * * *'     # every 6h at :30 — detect-data-silence
  workflow_dispatch:

concurrency:
  group: cron-server
  cancel-in-progress: false

jobs:
  every-5min:
    name: Every 5 min (replay-fallback + run-background-migrations + keep-warm)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '*/5 * * * *' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: POST /cron/replay-fallback
        run: |
          BASE_URL='https://spanlens-server.vercel.app'
          STATUS=$(curl -sS -o /tmp/body -w '%{http_code}' \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$BASE_URL/cron/replay-fallback")
          echo "Status: $STATUS"
          cat /tmp/body
          if [ "$STATUS" -ge 400 ]; then exit 1; fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: POST /cron/run-background-migrations
        run: |
          BASE_URL='https://spanlens-server.vercel.app'
          STATUS=$(curl -sS -o /tmp/body -w '%{http_code}' \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$BASE_URL/cron/run-background-migrations")
          echo "Status: $STATUS"
          cat /tmp/body
          if [ "$STATUS" -ge 400 ]; then exit 1; fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: POST /cron/keep-warm
        run: |
          BASE_URL='https://spanlens-server.vercel.app'
          STATUS=$(curl -sS -o /tmp/body -w '%{http_code}' \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$BASE_URL/cron/keep-warm")
          echo "Status: $STATUS"
          cat /tmp/body
          if [ "$STATUS" -ge 400 ]; then exit 1; fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  every-6h:
    name: Every 6 hours (execute-pending-deletions)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '0 */6 * * *' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: POST /cron/execute-pending-deletions
        run: |
          BASE_URL='https://spanlens-server.vercel.app'
          STATUS=$(curl -sS -o /tmp/body -w '%{http_code}' \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$BASE_URL/cron/execute-pending-deletions")
          echo "Status: $STATUS"
          cat /tmp/body
          if [ "$STATUS" -ge 400 ]; then exit 1; fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  hourly-31:
    name: Hourly at :31 (self-monitor)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '31 * * * *' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST /cron/self-monitor
        run: |
          BASE_URL='https://spanlens-server.vercel.app'
          STATUS=$(curl -sS -o /tmp/body -w '%{http_code}' \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$BASE_URL/cron/self-monitor")
          echo "Status: $STATUS"
          cat /tmp/body
          if [ "$STATUS" -ge 400 ]; then exit 1; fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  hourly-17:
    name: Hourly at :17 (detect-orphan-spans)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '17 * * * *' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST /cron/detect-orphan-spans
        run: |
          BASE_URL='https://spanlens-server.vercel.app'
          STATUS=$(curl -sS -o /tmp/body -w '%{http_code}' \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$BASE_URL/cron/detect-orphan-spans")
          echo "Status: $STATUS"
          cat /tmp/body
          if [ "$STATUS" -ge 400 ]; then exit 1; fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  hourly-00:
    name: Hourly at :00 (detect-missing-model-prices)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '0 * * * *' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST /cron/detect-missing-model-prices
        run: |
          BASE_URL='https://spanlens-server.vercel.app'
          STATUS=$(curl -sS -o /tmp/body -w '%{http_code}' \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$BASE_URL/cron/detect-missing-model-prices")
          echo "Status: $STATUS"
          cat /tmp/body
          if [ "$STATUS" -ge 400 ]; then exit 1; fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  daily-02:
    name: Daily 02:00 UTC (events-reconciliation)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '0 2 * * *' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: POST /cron/events-reconciliation
        run: |
          BASE_URL='https://spanlens-server.vercel.app'
          STATUS=$(curl -sS -o /tmp/body -w '%{http_code}' \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$BASE_URL/cron/events-reconciliation")
          echo "Status: $STATUS"
          cat /tmp/body
          if [ "$STATUS" -ge 400 ]; then exit 1; fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  daily-09:
    name: Daily 09:00 UTC (recommend-savings-alerts)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '0 9 * * *' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: POST /cron/recommend-savings-alerts
        run: |
          BASE_URL='https://spanlens-server.vercel.app'
          STATUS=$(curl -sS -o /tmp/body -w '%{http_code}' \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$BASE_URL/cron/recommend-savings-alerts")
          echo "Status: $STATUS"
          cat /tmp/body
          if [ "$STATUS" -ge 400 ]; then exit 1; fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  daily-10:
    name: Daily 10:00 UTC (check-past-due-downgrades)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '0 10 * * *' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: POST /cron/check-past-due-downgrades
        run: |
          BASE_URL='https://spanlens-server.vercel.app'
          STATUS=$(curl -sS -o /tmp/body -w '%{http_code}' \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$BASE_URL/cron/check-past-due-downgrades")
          echo "Status: $STATUS"
          cat /tmp/body
          if [ "$STATUS" -ge 400 ]; then exit 1; fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  daily-03:
    name: Daily 03:00 UTC (prune-judge-cache)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '0 3 * * *' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: POST /cron/prune-judge-cache
        run: |
          BASE_URL='https://spanlens-server.vercel.app'
          STATUS=$(curl -sS -o /tmp/body -w '%{http_code}' \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$BASE_URL/cron/prune-judge-cache")
          echo "Status: $STATUS"
          cat /tmp/body
          if [ "$STATUS" -ge 400 ]; then exit 1; fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  every-6h-30:
    name: Every 6 hours at :30 (detect-data-silence)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '30 */6 * * *' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: POST /cron/detect-data-silence
        run: |
          BASE_URL='https://spanlens-server.vercel.app'
          STATUS=$(curl -sS -o /tmp/body -w '%{http_code}' \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$BASE_URL/cron/detect-data-silence")
          echo "Status: $STATUS"
          cat /tmp/body
          if [ "$STATUS" -ge 400 ]; then exit 1; fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  weekly-mon-09:
    name: Weekly Monday 09:00 UTC (stale-key-reminders + weekly-digest)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '0 9 * * 1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: POST /cron/stale-key-reminders
        run: |
          BASE_URL='https://spanlens-server.vercel.app'
          STATUS=$(curl -sS -o /tmp/body -w '%{http_code}' \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$BASE_URL/cron/stale-key-reminders")
          echo "Status: $STATUS"
          cat /tmp/body
          if [ "$STATUS" -ge 400 ]; then exit 1; fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      # Weekly usage digest. Safe to double-fire alongside the Vercel cron:
      # the handler checks cron_job_runs for a successful run in the same
      # ISO week and no-ops when one exists.
      - name: POST /cron/weekly-digest
        run: |
          BASE_URL='https://spanlens-server.vercel.app'
          STATUS=$(curl -sS -o /tmp/body -w '%{http_code}' \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$BASE_URL/cron/weekly-digest")
          echo "Status: $STATUS"
          cat /tmp/body
          if [ "$STATUS" -ge 400 ]; then exit 1; fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
