name: E2E (Playwright smoke)

# Manual-only after PR #269's stabilisation. CI #13 was the first green
# run after 12 layered fixes (password sign-in, workspace bootstrap,
# encrypted provider_keys, supabase stack bounce, OPENAI_API_BASE env,
# GITHUB_TOKEN for setup-cli, ClickHouse direct poll, etc.). Now that
# the spec is stable, we keep automatic trigger off to avoid burning
# CI minutes on unrelated PRs — operator runs it from the Actions UI
# before merging anything that touches proxy / auth / log paths.
#
# Flip back to `pull_request` triggers after 5 consecutive clean
# manual runs (Sprint 3-4 success criterion in 06-development-plan.md).
on:
  workflow_dispatch:

# R-3 / R-23 — single smoke spec exercising signup → api key → proxy → /requests.
# Spec lives in apps/web/__e2e__/smoke.spec.ts.
#
# Stack we bring up in CI (mirrors `docker compose -f docker-compose.dev.yml`):
#
#   supabase  via `supabase start` CLI (gotrue + kong + db, official wiring)
#   clickhouse  via docker-compose service (24.10-alpine)
#   server      pnpm --filter server dev (background)
#   web         pnpm --filter web dev (background)
#   mock-openai pnpm --filter server exec tsx scripts/mock-openai-server.ts (background)
#
# We do NOT use `docker compose up server` in CI because the dev container
# rebuilds on every push and that wastes 60-90s. Running the dev servers
# directly with `pnpm dev` is faster and gives Playwright a tighter signal.
#
# Artifacts: test-results/ (traces, screenshots, videos) + playwright-report/
# uploaded on failure for triage.

jobs:
  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest
        env:
          # `setup-cli` resolves the latest release via the GitHub API.
          # Without GITHUB_TOKEN it goes anonymous and burns the 60/h
          # rate limit shared across the runner's IP — PR #269 CI #9 hit
          # exactly this (rate limit exceeded, install failed before any
          # other step ran). The token is auto-provisioned by Actions
          # with `public_repo` scope on PRs, which is enough for the
          # release lookup. Pinning to a specific version (e.g.
          # `version: 1.226.x`) would also work but skips security
          # patches between bumps.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # supabase start brings up the full Postgres + GoTrue + Kong + Studio
      # stack on a set of well-known ports. The status output is JSON so we
      # can read service_role_key + api_url without parsing log lines.
      - name: Start Supabase stack
        run: |
          # Skip known-superseded migrations that have been fake-applied in
          # production (see CLAUDE.md "Broken migration 복구 절차"). Mirrors
          # the same workaround in .github/workflows/ci.yml — the broken
          # 20260609150000 file stays in git for audit, but the CI runner
          # removes it so `supabase db reset` against the fresh local
          # Postgres can finish without retripping the original constraint
          # violation. Add new entries here only after the supabase MCP
          # fake-apply has been executed in production.
          rm -f supabase/migrations/20260609150000_register_orphan_span_link.sql
          supabase start
          # `supabase start` brings up the stack with a baseline schema, but
          # does NOT always replay every file under supabase/migrations/
          # against the local DB — a row from a newer migration can be
          # missing from PostgREST's schema cache (PR #269 CI #4 hit exactly
          # this: provider_keys.project_id added in 20260505040000_unified_keys.sql
          # was absent). `db reset --no-seed` re-applies all migrations in
          # order. `--no-seed` skips supabase/seed.sql so dev fixtures don't
          # pollute the E2E run.
          supabase db reset --no-seed
          # Diagnostic: confirm the column actually landed in the DB. If
          # this prints `project_id` then the migration ran and the issue
          # is PostgREST schema cache (next step handles it). If absent,
          # the migration itself didn't apply and the next step's bounce
          # won't help.
          PGPASSWORD=postgres psql -h localhost -p 54322 -U postgres -d postgres \
            -c "SELECT column_name FROM information_schema.columns WHERE table_name='provider_keys' ORDER BY ordinal_position;"
          # NOTIFY-based reload (CI #6) did not flip the cache — supabase
          # CLI's bundled PostgREST either ignores the notification or
          # caches the schema in a way the LISTEN handler doesn't rebuild.
          # Bounce the whole supabase stack instead. Adds ~60-90s to the
          # workflow but guarantees PostgREST rebuilds the schema cache
          # from the current DB state. The earlier `db reset` is still
          # needed because `supabase start` after `supabase stop` doesn't
          # re-apply migrations a second time.
          supabase stop --no-backup
          supabase start
          # Re-read keys after the bounce — the new instance may have
          # rotated them (in practice supabase keeps deterministic
          # local-dev keys but we don't want to rely on that).
          status_json=$(supabase status -o json)
          # Persist the resolved URLs/keys so subsequent steps can read them
          # via $GITHUB_ENV without grepping the supabase status output again.
          status_json=$(supabase status -o json)
          {
            echo "E2E_SUPABASE_URL=$(echo "$status_json" | jq -r .API_URL)"
            echo "E2E_SUPABASE_SERVICE_KEY=$(echo "$status_json" | jq -r .SERVICE_ROLE_KEY)"
            echo "E2E_SUPABASE_ANON_KEY=$(echo "$status_json" | jq -r .ANON_KEY)"
          } >> "$GITHUB_ENV"

      # ClickHouse alone — no rebuild needed, the official image starts in ~5s.
      # We sidecar it rather than running the full docker-compose stack so the
      # server can run from `pnpm dev` and pick up source changes without a
      # container rebuild.
      - name: Start ClickHouse sidecar
        run: |
          docker run -d --name clickhouse \
            -e CLICKHOUSE_DB=spanlens \
            -e CLICKHOUSE_USER=spanlens \
            -e CLICKHOUSE_PASSWORD=spanlens_ci_password \
            -e CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1 \
            -p 8123:8123 -p 9000:9000 \
            --ulimit nofile=262144:262144 \
            clickhouse/clickhouse-server:24.10-alpine
          # Wait for ClickHouse to answer HTTP. The image takes ~5-10s to
          # boot; busy-loop a bit rather than a flat sleep.
          for i in {1..30}; do
            if curl -sf http://localhost:8123/ping | grep -q Ok; then
              echo "ClickHouse ready"
              break
            fi
            sleep 1
          done

      - name: Apply ClickHouse schema
        env:
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: spanlens
          CLICKHOUSE_PASSWORD: spanlens_ci_password
          CLICKHOUSE_DB: spanlens
        # `ch:migrate` is a root-level script (package.json) that runs the
        # apply.ts migration runner — see CLAUDE.md DB 작업 규칙.
        run: pnpm ch:migrate

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Start mock OpenAI
        run: |
          pnpm --filter server exec tsx scripts/mock-openai-server.ts &
          # Wait for /health
          for i in {1..20}; do
            if curl -sf http://localhost:4000/health > /dev/null; then
              echo "mock-openai ready"
              break
            fi
            sleep 1
          done

      - name: Start server (background)
        env:
          PORT: 3001
          SUPABASE_URL: ${{ env.E2E_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ env.E2E_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.E2E_SUPABASE_SERVICE_KEY }}
          # Hardcoded dummy ENCRYPTION_KEY for CI — E2E never handles real
          # provider keys (mock-openai accepts anything). Stable value here
          # so the spec's inline aes256Encrypt and the server's
          # aes256Decrypt agree on the key material without needing a
          # GitHub Actions secret. NOT used in production deploy paths.
          ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          CLICKHOUSE_URL: http://localhost:8123
          CLICKHOUSE_USER: spanlens
          CLICKHOUSE_PASSWORD: spanlens_ci_password
          CLICKHOUSE_DB: spanlens
          OPENAI_API_BASE: http://localhost:4000/v1
          # R-32 Phase E — feedback admin allowlist for the spec. The value
          # must match E2E_FEEDBACK_ADMIN_EMAIL in the "Run Playwright smoke"
          # step or the PATCH assertion 403s. Stable string so production
          # SPANLENS_ADMIN_EMAILS does not need to know about it.
          SPANLENS_ADMIN_EMAILS: admin-e2e@spanlens.test
        run: |
          pnpm --filter server dev > /tmp/server.log 2>&1 &
          for i in {1..40}; do
            if curl -sf http://localhost:3001/health/ready > /dev/null; then
              echo "server ready"
              break
            fi
            sleep 1
          done

      - name: Start web (background)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.E2E_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.E2E_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: http://localhost:3001
        run: |
          pnpm --filter web dev > /tmp/web.log 2>&1 &
          for i in {1..60}; do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "web ready"
              break
            fi
            sleep 1
          done

      - name: Run Playwright smoke
        env:
          E2E_BASE_URL: http://localhost:3000
          E2E_SERVER_URL: http://localhost:3001
          # Must match the dummy ENCRYPTION_KEY the server boots with so the
          # spec's inline AES-256-GCM helper writes a ciphertext the server's
          # aes256Decrypt can read back. See the "Start server" step above for
          # the rationale on hardcoding instead of using a secret.
          ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          # R-32 Phase E — admin email used by feedback.spec.ts. Must be
          # listed in the server's SPANLENS_ADMIN_EMAILS (set in the "Start
          # server" step). The spec emits a targeted error on 403 if these
          # drift apart.
          E2E_FEEDBACK_ADMIN_EMAIL: admin-e2e@spanlens.test
        run: pnpm --filter web exec playwright test --reporter=list

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            apps/web/test-results/
            apps/web/playwright-report/
          retention-days: 7

      - name: Upload server/web logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: dev-server-logs-${{ github.run_id }}
          path: |
            /tmp/server.log
            /tmp/web.log
          retention-days: 7

      - name: Stop services
        if: always()
        run: |
          docker stop clickhouse || true
          docker rm clickhouse || true
          supabase stop --no-backup || true
