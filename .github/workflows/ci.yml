name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck / Lint / Test / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `apps/server/eslint.config.mjs` imports `@spanlens/eslint-plugin` from
      # its compiled `dist/`. `pnpm install` does not run dependent packages'
      # build scripts, so without this step the Lint (server) job fails with
      # `Cannot find module '@spanlens/eslint-plugin/dist/index.js'`.
      - name: Build @spanlens/eslint-plugin
        run: pnpm --filter @spanlens/eslint-plugin build

      # `apps/server` and `apps/web` import from `@spanlens/api-types`
      # whose `package.json` exports point at `dist/index.d.ts`. `pnpm
      # install` does not build dependents, so without this step the
      # typecheck job fails with `Cannot find module '@spanlens/api-types'`.
      # See Sprint 7 PR 2 (#277) where this was added.
      - name: Build @spanlens/api-types
        run: pnpm --filter @spanlens/api-types build

      - name: Typecheck (all packages)
        run: pnpm --recursive typecheck

      - name: Lint (web)
        run: pnpm --filter web lint

      - name: Lint (server)
        run: pnpm --filter server lint

      - name: Test (server)
        run: pnpm --filter server test
        env:
          ENCRYPTION_KEY: ${{ secrets.CI_ENCRYPTION_KEY || 'YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE=' }}

      - name: Test (sdk)
        run: pnpm --filter sdk test

      - name: Build (web)
        run: pnpm --filter web build

      - name: Build (sdk)
        run: pnpm --filter sdk build
