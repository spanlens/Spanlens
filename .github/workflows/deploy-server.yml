name: Apply production DB migrations

# Applies any pending Supabase migrations to the linked production project
# on every main push that touches apps/server or supabase/migrations.
# Idempotent via the supabase_migrations.schema_migrations ledger.
#
# Server code deployment is handled by Vercel's git integration directly
# (the "Vercel – spanlens-server" check on every commit). Originally this
# workflow also ran `npx vercel --cwd apps/server --prod` as a second
# `deploy` job that needs(migrate), aiming to guarantee migrate-before-
# deploy ordering (CLAUDE.md gotcha #25). That step never actually
# coordinated: Vercel git integration deploys in parallel anyway, and
# after PR #277 added a workspace:* dep the CLI deploy started failing
# unconditionally because `--cwd apps/server` uploads only that folder
# without pnpm-workspace.yaml, so npm could not resolve workspace:*.
#
# Removed the deploy job. The migrate step is what this workflow now
# owns. Best-effort ordering: migrate usually finishes in seconds while
# the Vercel server build takes ~2-3 minutes, so migrate completes first
# in practice. If a tighter guarantee becomes necessary we can switch to
# uploading the full repo with `npx vercel --prod` (no --cwd) so
# workspace deps resolve, but the simpler approach is to keep the two
# pipelines independent.
#
# Required secrets:
#   SUPABASE_ACCESS_TOKEN  — personal access token from
#                            https://supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD   — production DB password (Supabase dashboard →
#                            Project Settings → Database)

on:
  push:
    branches: [main]
    paths:
      - 'apps/server/**'
      - 'supabase/migrations/**'
  # Manual trigger for re-running the migrate step after a fix that did
  # not touch the matched paths (e.g. a change to this workflow itself).
  workflow_dispatch:

# Concurrency: serialize main-branch deploys so two pushes in quick
# succession don't fight over the linked project's migration lock.
concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply DB migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: supabase/setup-cli@v3
        with:
          version: latest

      - name: Push migrations to production
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref gebocvcsjlarxhyauadf
          supabase db push --linked --include-all

