name: Deploy production (DB + server)

# Single workflow that owns the production deployment path. Triggers on any
# main push that touches the server OR the Supabase migrations folder.
#
# Job order (sequential by design):
#   1. migrate  — applies any pending Supabase migrations to the linked
#                 production project. Idempotent (already-applied migrations
#                 are no-ops via the supabase_migrations.schema_migrations
#                 ledger).
#   2. deploy   — pushes the server build to Vercel. Only runs if step 1
#                 succeeds, so a broken migration blocks the code rollout
#                 instead of producing the "code expects column X, prod
#                 doesn't have it" 500 failure mode that bit us before
#                 (see CLAUDE.md gotcha #25).
#
# Required secrets (one-time setup in repo Settings → Secrets):
#   SUPABASE_ACCESS_TOKEN  — personal access token from
#                            https://supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD   — production DB password (Supabase dashboard →
#                            Project Settings → Database)
#   VERCEL_TOKEN           — already set, used by the deploy job
#
# If migrate fails, deploy is skipped — the previous server build stays
# live and the broken migration can be fixed in a follow-up PR. Migrations
# are append-only per project convention, so rolling back the server alone
# does not require a DB rollback.

on:
  push:
    branches: [main]
    paths:
      - 'apps/server/**'
      - 'supabase/migrations/**'

# Concurrency: serialize main-branch deploys so two pushes in quick
# succession don't fight over the linked project's migration lock.
concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply DB migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Push migrations to production
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref gebocvcsjlarxhyauadf
          supabase db push --linked --include-all

  deploy:
    name: Deploy server to Vercel
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to Vercel
        run: npx vercel --cwd apps/server --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_kQ5H3egALXHjt7J0NSUg6AL6
          VERCEL_PROJECT_ID: prj_0jC72P2dIZYjjD79SyX8eaNP0GPx
