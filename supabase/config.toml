# Required by Supabase CLI >= 1.200 (pinned in CI). Local-stack identifier; the
# production project ref lives in the Supabase dashboard, not here.
project_id = "spanlens"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
# Wildcards so `redirectTo` (OAuth + password recovery via /auth/callback?next=...)
# is honored instead of falling back to site_url. Both hosts because the dev
# server is reachable as 127.0.0.1 and localhost.
additional_redirect_urls = ["http://127.0.0.1:3000/**", "http://localhost:3000/**"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.sms]
enable_signup = false

[realtime]
enabled = true

[analytics]
enabled = false

# OAuth providers — disabled by default. To enable locally, populate the
# four env vars below (e.g. in apps/web/.env.local) and restart the stack
# with `supabase stop && supabase start`. Production providers are
# configured via Supabase Dashboard, not this file. See
# docs/auth-oauth-setup.md for the full setup guide.
[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET)"

[auth.external.github]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_GITHUB_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_GITHUB_SECRET)"
